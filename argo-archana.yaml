apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginxdemos/hello
  namespace: archana
  annotations:
    kubernetes.io/change-cause: "image tag"
spec:
  strategy:
    type: Recreate
  replicas: 2
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
      - name: c1
        image: archanak0210/nginxdemos/hello:archana
